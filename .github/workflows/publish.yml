name: Publicar no npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC: npm confia neste workflow, sem token de longa duração
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing exige npm >= 11.5.1 (Node 20 traz npm 10).
      # Fixado em npm@11 porque o npm@latest (12.x) exige Node >= 22.
      - name: Atualizar npm
        run: npm install -g npm@11

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      # Sem NODE_AUTH_TOKEN: o npm CLI troca o token OIDC automaticamente.
      # Com trusted publisher configurado, o provenance é gerado sozinho.
      - name: Publicar no npm (OIDC)
        run: npm publish --access public
